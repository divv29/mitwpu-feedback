<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIT-WPU | Feedback Submitted</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #ECFDF5 0%, #F0FFF4 100%); }
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body data-page="success">

<div class="confetti" id="confetti"></div>

<!-- Top Nav -->
<div class="logo-bar" style="position:relative;z-index:10;">
  <img src="assets/logo.webp" alt="MIT-WPU Logo">
</div>

<!-- Success Content -->
<div class="success-page" style="position:relative;z-index:1;">
  <div class="success-card">
    <div class="success-icon">✅</div>

    <h2>Feedback Submitted!</h2>
    <p>Thank you for sharing your honest feedback. Your responses are anonymous and will help improve teaching quality at MIT-WPU Pune.</p>

    <div class="score-display">
      <div class="score-num" id="finalScore">0%</div>
      <div class="score-label">Overall Feedback Score</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
      <a href="dashboard.html" class="btn btn-primary btn-lg">← Back to Dashboard</a>
      <button class="btn btn-ghost" onclick="window.location.href='index.html'">Sign Out</button>
    </div>

    <p style="font-size:12px;color:#9CA3AF;margin-top:24px;">🔒 Your identity is protected. Feedback is completely anonymous.</p>
  </div>
</div>

<script src="js/questions.js"></script>
<script src="js/app.js"></script>
<script>
  // Confetti effect
  function createConfetti() {
    const container = document.getElementById('confetti');
    const colors = ['#003087', '#0055D4', '#3B82F6', '#10B981', '#F59E0B', '#60A5FA'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${Math.random() * 8 + 6}px;
        height: ${Math.random() * 8 + 6}px;
        animation-duration: ${Math.random() * 2 + 2}s;
        animation-delay: ${Math.random() * 1.5}s;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      container.appendChild(piece);
    }
    setTimeout(() => container.innerHTML = '', 5000);
  }

  document.addEventListener('DOMContentLoaded', () => {
    createConfetti();
    initSuccessPage();
  });
</script>
</body>
</html>
